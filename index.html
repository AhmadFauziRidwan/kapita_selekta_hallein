<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGIS Hallein, Austria</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;height:100vh}
body.dark{--bg:#0c0f1a;--card:rgba(17,20,35,.96);--border:rgba(59,130,246,.12);--accent:#60a5fa;--accent2:#93c5fd;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--hover:rgba(255,255,255,.04);--glow:rgba(59,130,246,.12);color:#e2e8f0}
body.light{--bg:#f8fafc;--card:rgba(255,255,255,.97);--border:rgba(59,130,246,.1);--accent:#2563eb;--accent2:#1d4ed8;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--hover:rgba(0,0,0,.03);--glow:rgba(37,99,235,.08);color:#1e293b}

#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:50px;background:linear-gradient(135deg,#1e40af,#2563eb,#3b82f6);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(37,99,235,.3)}
.ht{font-size:15px;font-weight:800;color:#fff;letter-spacing:.2px}
.hs{font-size:10px;color:rgba(255,255,255,.75)}
.hl,.hr{position:absolute;display:flex;gap:6px}
.hl{left:10px}.hr{right:10px}
.hb{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(6px)}
.hb:hover{background:rgba(255,255,255,.25);transform:scale(1.08)}

#map{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:1}

/* Left panel - Legend */
#lpanel{position:fixed;top:60px;left:10px;z-index:900;width:220px;max-height:calc(100vh - 120px);background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 32px var(--glow);overflow-y:auto;transition:transform .3s,opacity .3s}
#lpanel.hid{transform:translateX(-240px);opacity:0;pointer-events:none}
.lph{padding:10px 12px 6px;font-size:11px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px}
.lps{padding:4px 8px}
.sh{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:6px 4px 2px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.sh:hover{color:var(--accent)}
.sa{font-size:7px;transition:transform .2s}.sa.o{transform:rotate(90deg)}
.sb{overflow:hidden;max-height:0;transition:max-height .3s}.sb.o{max-height:300px}
.li{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;transition:all .15s;user-select:none}
.li:hover{background:var(--hover);transform:translateX(2px)}
.li.off{opacity:.2}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lt{font-size:10px;font-weight:500;color:var(--text);flex:1}
.ln{font-size:8px;color:var(--text3);background:var(--hover);padding:1px 4px;border-radius:5px}
.lsep{height:1px;background:var(--border);margin:2px 6px}
.bms{padding:4px 8px;border-top:1px solid var(--border)}
.bmt{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:4px}
.bo{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:10px;color:var(--text);transition:all .15s}
.bo:hover{background:var(--hover)}
.bo.a{background:rgba(139,92,246,.1);color:var(--accent);font-weight:600}
.br{width:8px;height:8px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0}
.bo.a .br{background:var(--accent);border-color:var(--accent)}

/* Right panel - POI Directory */
#rpanel{position:fixed;top:60px;right:10px;z-index:900;width:260px;max-height:calc(100vh - 120px);background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 32px var(--glow);display:flex;flex-direction:column;transition:transform .3s,opacity .3s}
#rpanel.hid{transform:translateX(280px);opacity:0;pointer-events:none}
.rph{padding:10px 12px 8px;font-size:12px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rph .rx{cursor:pointer;font-size:16px;color:var(--text3);transition:color .2s}
.rph .rx:hover{color:var(--accent)}
.rsel{margin:8px 10px;padding:8px 10px;background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;font-family:inherit;outline:none;cursor:pointer;width:calc(100% - 20px)}
.rsrch{margin:0 10px 6px;padding:7px 10px;background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;font-family:inherit;outline:none;width:calc(100% - 20px)}
.rsrch::placeholder{color:var(--text3)}
.rsrch:focus{border-color:var(--accent)}
.rlist{flex:1;overflow-y:auto;padding:0 6px 8px}
.ri{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:8px;cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(128,128,128,.05)}
.ri:hover{background:var(--hover);transform:translateX(2px)}
.ri-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-cat{font-size:9px;color:var(--text3)}
.rlist::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-thumb{background:rgba(59,130,246,.2);border-radius:3px}

/* Zoom - bottom right to avoid overlap */
.leaflet-top.leaflet-left{display:none!important}
.leaflet-bottom.leaflet-right{bottom:40px!important}
#zoom-custom{position:fixed;bottom:40px;left:14px;z-index:950;display:flex;flex-direction:column;gap:4px}
#zoom-custom button{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px var(--glow);transition:all .2s;font-weight:700}
#zoom-custom button:hover{background:rgba(59,130,246,.12);transform:scale(1.08)}

/* Bottom stats */
#bbar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:900;display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:5px 12px;box-shadow:0 6px 24px var(--glow)}
.bs{display:flex;align-items:center;gap:3px;padding:0 7px;border-right:1px solid var(--border)}.bs:last-child{border:none}
.bs-i{font-size:11px}.bs-n{font-size:12px;font-weight:800;color:var(--accent)}.bs-l{font-size:8px;color:var(--text3)}

/* Cluster */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(59,130,246,.2)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:linear-gradient(135deg,#1e40af,#3b82f6)!important;color:#fff!important;font-family:inherit!important;font-weight:700!important;font-size:12px!important;box-shadow:0 3px 12px rgba(37,99,235,.4)!important}

/* Popup */
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 8px 28px rgba(0,0,0,.25)!important}
body.dark .leaflet-popup-content-wrapper{background:#111428!important;border:1px solid rgba(59,130,246,.15)!important;color:#e2e8f0!important}
body.dark .leaflet-popup-tip{background:#111428!important}
body.light .leaflet-popup-content-wrapper{background:#fff!important;color:#1e293b!important}
body.light .leaflet-popup-tip{background:#fff!important}
.leaflet-popup-close-button{color:var(--text3)!important;font-size:18px!important}
.pt{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.pr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}.pk{color:var(--text2)}.pv{color:var(--text);text-align:right;max-width:130px}
.pb{display:inline-block;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:600;margin-top:3px}
.custom-tooltip{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:6px!important;color:var(--text)!important;font-family:inherit!important;font-size:10px!important;padding:3px 7px!important;box-shadow:0 3px 10px var(--glow)!important}
.leaflet-control-scale-line{background:var(--card)!important;border-color:var(--border)!important;color:var(--text2)!important;font-size:9px!important}
#loader{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse,#1a1040,#0c0f1a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s}
#loader.fade{opacity:0;pointer-events:none}
.spin{width:40px;height:40px;border:3px solid rgba(59,130,246,.15);border-top-color:#60a5fa;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lpanel::-webkit-scrollbar{width:3px}#lpanel::-webkit-scrollbar-thumb{background:rgba(59,130,246,.2);border-radius:3px}
</style>
</head>
<body class="dark">
<div id="loader"><div class="spin"></div><span style="color:#93c5fd;font-size:11px">Memuat peta Hallein...</span></div>
<header id="header">
<div class="hl"><div class="hb" id="thm">🌙</div><div class="hb" id="ltg">☰</div></div>
<div style="text-align:center"><div class="ht">🗺️ WebGIS Hallein, Austria</div><div class="hs">Distrik Hallein, Salzburg</div></div>
<div class="hr"><div class="hb" id="rtg">📋</div></div>
</header>
<div id="lpanel">
<div class="lph">📋 Legenda</div>
<div class="lps" id="leg"></div>
<div class="bms"><div class="bmt">🌍 Peta Dasar</div><div id="bml"></div></div>
</div>
<div id="rpanel">
<div class="rph"><span>📍 Direktori POI</span><span class="rx" id="rcl">✕</span></div>
<select class="rsel" id="rcat"><option value="all">Semua Kategori</option></select>
<input class="rsrch" id="rsrch" placeholder="Saring list...">
<div class="rlist" id="rlist"></div>
</div>
<div id="bbar"></div>
<div id="zoom-custom"><button onclick="map.zoomIn()">+</button><button onclick="map.zoomOut()">−</button></div>
<div id="map"></div>
<script>
(function(){
const C={'Komersial':{color:'#f97316',icon:'🏪',subs:{'Restoran':{c:'#fb923c',i:'🍽️',m:f=>['restaurant','cafe','fast_food','food_court'].includes(f.properties.amenity)},'Toko':{c:'#f59e0b',i:'🛒',m:f=>f.properties.shop&&f.properties.shop!=='supermarket'},'Supermarket':{c:'#ea580c',i:'🏬',m:f=>f.properties.shop==='supermarket'||f.properties.amenity==='supermarket'}}},'Pendidikan':{color:'#3b82f6',icon:'🎓',subs:{'Sekolah':{c:'#60a5fa',i:'🏫',m:f=>f.properties.amenity==='school'},'Universitas':{c:'#2563eb',i:'🎓',m:f=>f.properties.amenity==='university'},'Perguruan Tinggi':{c:'#818cf8',i:'📚',m:f=>f.properties.amenity==='college'}}},'Keuangan':{color:'#10b981',icon:'🏦',subs:{'Bank':{c:'#34d399',i:'🏦',m:f=>f.properties.amenity==='bank'},'ATM':{c:'#059669',i:'💳',m:f=>f.properties.amenity==='atm'}}}};
const P=Object.keys(C);
function cat(f){for(const p of P)for(const s of Object.keys(C[p].subs))if(C[p].subs[s].m(f))return{p,s};return null}

let dk=true;document.getElementById('thm').onclick=()=>{dk=!dk;document.body.className=dk?'dark':'light';document.getElementById('thm').textContent=dk?'🌙':'☀️';
if(cB!=='Satelit (Esri)')setB(dk?'CartoDB Dark':'OpenStreetMap')};

const map=L.map('map',{zoomControl:false,attributionControl:false}).setView([47.68,13.10],12);window.map=map;
L.control.scale({position:'bottomleft',imperial:false}).addTo(map);

const BM={'OpenStreetMap':{u:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',o:{maxZoom:19},i:'🗺️'},'Satelit (Esri)':{u:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',o:{maxZoom:18},i:'🛰️'},'Topografi':{u:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',o:{maxZoom:17},i:'⛰️'},'CartoDB Dark':{u:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',o:{maxZoom:19},i:'🌑'}};
let cTL=null,cB='OpenStreetMap';
function setB(n){if(cTL)map.removeLayer(cTL);cTL=L.tileLayer(BM[n].u,{...BM[n].o}).addTo(map);cB=n;document.querySelectorAll('.bo').forEach(e=>e.classList.toggle('a',e.dataset.n===n))}
const bl=document.getElementById('bml');Object.keys(BM).forEach(n=>{const o=document.createElement('div');o.className='bo'+(n===cB?' a':'');o.dataset.n=n;o.innerHTML=`<div class="br"></div>${BM[n].i} ${n}`;o.onclick=()=>setB(n);bl.appendChild(o)});
setB('CartoDB Dark');

function mk(c){return L.divIcon({className:'',html:`<div style="width:11px;height:11px;background:${c};border:2px solid rgba(255,255,255,.9);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3),0 0 8px ${c}44"></div>`,iconSize:[11,11],iconAnchor:[5,5]})}
function pp(pr,pn,sn){const sc=C[pn].subs[sn],nm=pr.name||'Tanpa Nama',tp=pr.amenity||pr.shop||'-';let h=`<div class="pt">${sc.i} ${nm}</div><span class="pb" style="background:${sc.c}22;color:${sc.c};border:1px solid ${sc.c}33">${pn} › ${sn}</span><div style="margin-top:4px">`;[['Tipe',tp],['Operator',pr.operator],['Jam Buka',pr.opening_hours]].forEach(([k,v])=>{if(v)h+=`<div class="pr"><span class="pk">${k}</span><span class="pv">${v}</span></div>`});return h+`<div class="pr"><span class="pk">OSM ID</span><span class="pv">${pr.osm_id||'-'}</span></div></div>`}

const sL={},cG={};
P.forEach(p=>{sL[p]={};cG[p]={};Object.keys(C[p].subs).forEach(s=>{cG[p][s]=L.markerClusterGroup({maxClusterRadius:45,showCoverageOnHover:false,iconCreateFunction:cl=>{const n=cl.getChildCount();return L.divIcon({html:`<div><span>${n}</span></div>`,className:`marker-cluster marker-cluster-${n<10?'small':n<30?'medium':'large'}`,iconSize:[38,38]})}});cG[p][s].addTo(map);sL[p][s]=cG[p][s]})});

const bL=L.layerGroup().addTo(map);
fetch('./clipping_boundary.geojson').then(r=>r.json()).then(b=>{L.geoJSON({type:'Feature',geometry:b,properties:{}},{style:{fillColor:'#a78bfa',fillOpacity:.04,color:'#f59e0b',weight:3,opacity:.8,dashArray:'10,6'}}).addTo(bL)}).catch(()=>{});

// POI data store
const poiList=[];

fetch('./data/hallein.geojson').then(r=>{if(!r.ok)throw 0;return r.json()}).then(data=>{
    const cn={};P.forEach(p=>{cn[p]={};Object.keys(C[p].subs).forEach(s=>cn[p][s]=0)});let tot=0;
    (data.features||[]).forEach(f=>{const c=cat(f);if(!c)return;cn[c.p][c.s]++;tot++;const col=C[c.p].subs[c.s].c,gt=f.geometry.type;
    if(gt==='Point'){const co=f.geometry.coordinates,m=L.marker([co[1],co[0]],{icon:mk(col)});m.bindPopup(pp(f.properties,c.p,c.s),{maxWidth:230});if(f.properties.name)m.bindTooltip(f.properties.name,{className:'custom-tooltip',direction:'top',offset:[0,-8]});m.feature=f;m._cat=c;cG[c.p][c.s].addLayer(m);
    poiList.push({name:f.properties.name||'Tanpa Nama',p:c.p,s:c.s,lat:co[1],lng:co[0],marker:m,props:f.properties})}
    else if(gt==='Polygon'||gt==='MultiPolygon'){const ly=L.geoJSON(f,{style:{fillColor:col,fillOpacity:.2,color:col,weight:2,opacity:.7},onEachFeature:(fe,l)=>{l.bindPopup(pp(fe.properties,c.p,c.s),{maxWidth:230});if(fe.properties.name)l.bindTooltip(fe.properties.name,{className:'custom-tooltip',direction:'top'})}});ly.feature=f;cG[c.p][c.s].addLayer(ly);
    if(f.properties.name){const bounds=ly.getBounds();const center=bounds.getCenter();poiList.push({name:f.properties.name,p:c.p,s:c.s,lat:center.lat,lng:center.lng,layer:ly,props:f.properties})}}});
    const all=[];P.forEach(p=>Object.keys(C[p].subs).forEach(s=>all.push(...cG[p][s].getLayers())));
    if(all.length)map.fitBounds(L.featureGroup(all).getBounds().pad(0.05));
    mkLeg(cn);mkStats(cn,tot);buildPOI();
    setTimeout(()=>{document.getElementById('loader').classList.add('fade');setTimeout(()=>document.getElementById('loader').style.display='none',500)},300);
}).catch(()=>{document.getElementById('loader').innerHTML='<div style="color:#f87171;font-size:13px">⚠️ Gagal memuat data</div>'});

function mkLeg(cn){
    const a=document.getElementById('leg');a.innerHTML='';
    let bv=true;const bi=document.createElement('div');bi.className='li';bi.innerHTML='<div class="ld" style="background:transparent;border:2px dashed #f59e0b"></div><span class="lt">Batas Wilayah</span>';
    bi.onclick=()=>{bv=!bv;bi.classList.toggle('off',!bv);bv?bL.addTo(map):map.removeLayer(bL)};a.appendChild(bi);
    a.appendChild(Object.assign(document.createElement('div'),{className:'lsep'}));
    P.forEach(pn=>{const pc=C[pn],sks=Object.keys(pc.subs),pt=sks.reduce((x,k)=>x+cn[pn][k],0);if(!pt)return;
    const h=document.createElement('div');h.className='sh';h.innerHTML=`<span class="sa">▶</span><span style="color:${pc.color}">●</span> ${pc.icon} ${pn} <span style="margin-left:auto;font-size:8px;opacity:.5">${pt}</span>`;
    const b=document.createElement('div');b.className='sb';
    sks.forEach(sn=>{if(!cn[pn][sn])return;const sc=pc.subs[sn],it=document.createElement('div');it.className='li';it.innerHTML=`<div class="ld" style="background:${sc.c}"></div><span class="lt">${sc.i} ${sn}</span><span class="ln">${cn[pn][sn]}</span>`;let on=true;it.onclick=e=>{e.stopPropagation();on=!on;it.classList.toggle('off',!on);on?cG[pn][sn].addTo(map):map.removeLayer(cG[pn][sn])};b.appendChild(it)});
    h.onclick=()=>{b.classList.toggle('o');h.querySelector('.sa').classList.toggle('o')};a.appendChild(h);a.appendChild(b)});
}
function mkStats(cn,tot){
    const b=document.getElementById('bbar');b.innerHTML=`<div class="bs"><span class="bs-i">📍</span><span class="bs-n">${tot}</span><span class="bs-l">Total</span></div>`;
    P.forEach(pn=>Object.keys(C[pn].subs).forEach(sn=>{const n=cn[pn][sn];if(n)b.innerHTML+=`<div class="bs"><span class="bs-i">${C[pn].subs[sn].i}</span><span class="bs-n">${n}</span><span class="bs-l">${sn}</span></div>`}));
}

// POI Directory
function buildPOI(){
    const sel=document.getElementById('rcat');
    P.forEach(pn=>{const pc=C[pn];Object.keys(pc.subs).forEach(sn=>{const o=document.createElement('option');o.value=pn+'|'+sn;o.textContent=`${pc.subs[sn].i} ${sn}`;sel.appendChild(o)})});
    renderPOI();
    sel.onchange=renderPOI;
    document.getElementById('rsrch').oninput=renderPOI;
}
function renderPOI(){
    const cv=document.getElementById('rcat').value;
    const q=document.getElementById('rsrch').value.toLowerCase().trim();
    const list=document.getElementById('rlist');list.innerHTML='';
    let filtered=poiList.filter(p=>p.name!=='Tanpa Nama');
    if(cv!=='all'){const[cp,cs]=cv.split('|');filtered=filtered.filter(p=>p.p===cp&&p.s===cs)}
    if(q)filtered=filtered.filter(p=>p.name.toLowerCase().includes(q));
    filtered.sort((a,b)=>a.name.localeCompare(b.name));
    filtered.slice(0,80).forEach(poi=>{
        const sc=C[poi.p].subs[poi.s];
        const d=document.createElement('div');d.className='ri';
        d.innerHTML=`<div class="ri-icon" style="background:${sc.c}22;color:${sc.c}">${sc.i}</div><div class="ri-info"><div class="ri-name">${poi.name}</div><div class="ri-cat">${poi.p} › ${poi.s}</div></div>`;
        d.onclick=()=>{map.flyTo([poi.lat,poi.lng],17,{duration:1});
        if(poi.marker){setTimeout(()=>{cG[poi.p][poi.s].zoomToShowLayer(poi.marker,()=>{poi.marker.openPopup()})},1200)}};
        list.appendChild(d);
    });
    if(!filtered.length)list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px">Tidak ada hasil</div>';
}

// Toggles
const lp=document.getElementById('lpanel'),rp=document.getElementById('rpanel');
document.getElementById('ltg').onclick=()=>lp.classList.toggle('hid');
document.getElementById('rtg').onclick=()=>rp.classList.toggle('hid');
document.getElementById('rcl').onclick=()=>rp.classList.add('hid');
if(innerWidth<768){lp.classList.add('hid');rp.classList.add('hid')}
